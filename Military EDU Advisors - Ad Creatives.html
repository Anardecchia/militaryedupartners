document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Barlow Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c18399fa-a22b-441a-8baf-2f5ab73a3813\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Barlow Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"1d0b70ba-75cb-49a7-ae8f-7771d0430d09\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Barlow Condensed';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"480f1d14-b330-41b6-95d1-7cce9a117c1a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Barlow Condensed';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"e6c9b012-8f02-4771-a456-2525005fa963\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Barlow Condensed';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"9eb804b4-a6c6-4d2e-bcd6-12c77373a7e6\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Military EDU Advisors — Color tokens\n   Lifted verbatim from the production theme (militaryedupartners). */\n:root {\n  /* ---- Brand: Crimson ---- */\n  --mea-crimson: #9f171c;        /* primary brand red — buttons, accents, links */\n  --mea-crimson-light: #c62227;  /* hover state for primary buttons */\n  --mea-crimson-bright: #ff353b; /* hero headline highlight on dark imagery */\n  --mea-crimson-tint: #fff5f5;   /* selected/hover fill on light surfaces */\n  --mea-crimson-glow: rgba(159, 23, 28, 0.18); /* focus ring */\n\n  /* ---- Ink / neutrals ---- */\n  --mea-ink: #161719;            /* primary text */\n  --mea-slate: #384150;          /* secondary text, trust bar labels */\n  --mea-steel: #202631;          /* strong UI text on light cards */\n  --mea-muted: #667085;          /* body muted / helper text */\n  --mea-silver: #adb5c1;         /* placeholder text, faint radio borders */\n\n  /* ---- Surfaces ---- */\n  --mea-paper: #ffffff;          /* cards, header */\n  --mea-soft: #f4f6f9;           /* page background */\n  --mea-off-white: #f7f8fa;      /* input + option fills */\n  --mea-dark: #101113;           /* form-card header bar */\n  --mea-black: #08090a;          /* footer + closing band */\n\n  /* ---- Lines / borders ---- */\n  --mea-line: #e6e9ee;           /* hairline dividers */\n  --mea-border: #dde2ea;         /* input + option borders */\n\n  /* ---- Semantic: success / trust ---- */\n  --mea-green: #18813f;          /* check dots, success */\n  --mea-green-bg: #e6f6ec;       /* success icon halo */\n\n  /* ============ Semantic aliases ============ */\n  --text-strong: var(--mea-ink);\n  --text-body: var(--mea-muted);\n  --text-on-dark: #ffffff;\n  --text-on-dark-muted: rgba(255, 255, 255, 0.88);\n\n  --surface-page: var(--mea-soft);\n  --surface-card: var(--mea-paper);\n  --surface-field: var(--mea-off-white);\n  --surface-inverse: var(--mea-black);\n\n  --border-hairline: var(--mea-line);\n  --border-field: var(--mea-border);\n\n  --accent: var(--mea-crimson);\n  --accent-hover: var(--mea-crimson-light);\n  --accent-tint: var(--mea-crimson-tint);\n  --success: var(--mea-green);\n}\n\n/* Military EDU Advisors — Typography tokens\n   Display: Barlow Condensed (condensed, heavy, uppercase-friendly) for headlines,\n   eyebrows, buttons, numbers. Body: Barlow for running text and UI. */\n:root {\n  --font-display: \"Barlow Condensed\", \"Arial Narrow\", Arial, sans-serif;\n  --font-body: \"Barlow\", Arial, Helvetica, sans-serif;\n\n  /* Weights */\n  --fw-regular: 400; /* @kind other */\n  --fw-medium: 500; /* @kind other */\n  --fw-semibold: 600; /* @kind other */\n  --fw-bold: 700; /* @kind other */\n  --fw-black: 800; /* @kind other */\n\n  /* Display sizes (Barlow Condensed) — tight leading, slight letter-spacing on eyebrows */\n  --type-hero: clamp(50px, 4vw, 74px);   /* hero H1 */\n  --type-display: clamp(34px, 4vw, 48px);/* section titles */\n  --type-h2: 38px;\n  --type-h3: 23px;                       /* card titles */\n  --type-h4: 20px;\n  --type-eyebrow: 13px;                  /* uppercase kicker, 0.12em tracking */\n\n  /* Body sizes (Barlow) */\n  --type-lead: 17px;\n  --type-base: 15px;\n  --type-sm: 14px;\n  --type-xs: 13px;\n  --type-2xs: 12px;\n  --type-legal: 11px;     /* TCPA / disclaimers */\n\n  /* Line heights */\n  --lh-tight: 0.95;       /* @kind other */\n  --lh-snug: 1.1;         /* @kind other */\n  --lh-base: 1.5;         /* @kind other */\n\n  /* Tracking */\n  --tracking-eyebrow: 0.12em;\n  --tracking-button: 0.03em;\n  --tracking-label: 0.24em; /* tiny all-caps sublabels */\n}\n\n/* Military EDU Advisors — Spacing, radius, shadow, layout tokens */\n:root {\n  /* Spacing scale (px) */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-section: 70px;   /* vertical rhythm between marketing sections */\n\n  /* Radii — small and restrained; this brand is squared-off, not pill-shaped */\n  --radius-sm: 5px;        /* buttons, inputs, options */\n  --radius: 6px;           /* default */\n  --radius-md: 7px;        /* program / feature cards */\n  --radius-lg: 8px;        /* the form/quiz card */\n  --radius-pill: 999px;    /* trust dots, step numbers (circles) */\n\n  /* Shadows */\n  --shadow-card: 0 8px 24px rgba(16, 24, 40, 0.04);   /* resting marketing cards */\n  --shadow-header: 0 2px 14px rgba(16, 24, 40, 0.08); /* sticky header */\n  --shadow-lg: 0 18px 45px rgba(16, 24, 40, 0.16);    /* elevated form card */\n\n  /* Layout */\n  --container: 1180px;\n  --container-gutter: 80px;\n\n  /* Motion */\n  --ease: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --dur-fast: 0.15s; /* @kind other */\n  --dur: 0.2s; /* @kind other */\n  --dur-slow: 0.4s; /* @kind other */\n}\n\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;}\n  body{margin:0;background:#1f2227;font-family:var(--font-body);color:#fff;\n    min-width:100%;min-height:100vh;width:max-content;padding:48px;box-sizing:border-box;}\n  .page-head{max-width:880px;margin:0 0 8px;}\n  .page-head h1{font-family:var(--font-display);font-weight:800;font-size:34px;letter-spacing:.01em;}\n  .page-head p{color:#aab2bd;font-size:14px;margin-top:6px;max-width:620px;line-height:1.5;}\n  .group{margin-top:40px;}\n  .group__label{font-family:var(--font-display);font-weight:800;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#ff595e;margin-bottom:4px;}\n  .group__sub{color:#8b94a0;font-size:12px;margin-bottom:20px;}\n  .rowflex{display:flex;align-items:flex-start;gap:28px;}\n  .frame{flex:none;}\n  .frame__cap{font-size:11px;font-weight:700;color:#8b94a0;margin-bottom:8px;letter-spacing:.04em;}\n  .ad{position:relative;overflow:hidden;background:#fff;box-shadow:0 12px 30px rgba(0,0,0,.4);}\n\n  /* ===== Logo lockups (inline, brand-faithful) ===== */\n  .lk{display:inline-flex;align-
